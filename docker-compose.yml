version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: atendimento_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: atendimento
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/data/postgres

  backend:
    build: .
    container_name: atendimento_backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  pgdata: